<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arcade Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Press Start 2P',cursive;
  background:#000814;
  color:white;
  overflow-x:hidden;
  transition: background 0.6s ease, color 0.6s ease;
}

/* ===== DAY MODE ===== */
body.day{
  background:#87CEEB;
  color:#001F54;
}

/* ===== STARFIELD ===== */
.star{
  position:fixed;
  width:2px;
  height:2px;
  background:white;
  animation:starMove linear infinite;
  z-index:-10;
}

body.day .star{
  display:none;
}

@keyframes starMove{
  from{transform:translateY(-10px);}
  to{transform:translateY(110vh);}
}

/* ===== GRID FLOOR ===== */
.grid-floor{
  position:fixed;
  bottom:0;
  width:100%;
  height:50vh;
  background:
    linear-gradient(#001F54 1px, transparent 1px),
    linear-gradient(90deg,#001F54 1px, transparent 1px);
  background-size:40px 40px;
  transform:perspective(400px) rotateX(65deg);
  animation:gridMove 4s linear infinite;
  opacity:0.5;
  z-index:-9;
  transition: background 0.6s ease;
}

body.day .grid-floor{
  background:
    linear-gradient(#ffffff80 1px, transparent 1px),
    linear-gradient(90deg,#ffffff80 1px, transparent 1px);
}

@keyframes gridMove{
  from{background-position:0 0,0 0;}
  to{background-position:0 40px,0 40px;}
}

/* ===== CARD ===== */
.card{
  background:rgba(0,31,84,0.9);
  border:3px solid #FFD60A;
  box-shadow:0 0 15px #FF003C;
  transition: all 0.6s ease;
}

body.day .card{
  background:rgba(255,255,255,0.9);
  border:3px solid #001F54;
  box-shadow:0 0 15px #001F54;
}

/* ===== BUTTON ===== */
.btn{
  background:#FF003C;
  color:#FFD60A;
  border:3px solid #FFD60A;
  padding:12px 20px;
  box-shadow:4px 4px 0 #001F54;
  transition: all 0.3s ease;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:6px 6px 0 #001F54;
}

.toggle-btn{
  background:#FF003C;
  color:#FFD60A;
  border:3px solid #FFD60A;
  padding:8px 16px;
  cursor:pointer;
}

</style>
</head>

<body class="font-bold">

<div class="grid-floor"></div>

<header class="fixed w-full bg-[#001F54] border-b-4 border-[#FFD60A] z-50">
<nav class="max-w-6xl mx-auto flex justify-between items-center px-6 py-4">
<h1 class="text-[#FFD60A] text-lg">AT.PORTFOLIO</h1>
<button id="toggleTheme" class="toggle-btn">☀️ DAY</button>
</nav>
</header>

<main class="pt-32 space-y-32 max-w-5xl mx-auto px-6 relative z-10">

<section class="card p-8 text-center space-y-6">
<h2 class="text-3xl text-[#FFD60A]">Avinash Tiwari</h2>
<p class="text-[#FF003C]">Neon Software Warrior</p>
<button class="btn">DOWNLOAD CV</button>
</section>

<section class="card p-8">
<h3 class="mb-4 text-[#FFD60A]">ABOUT</h3>
<p>B.Tech CSE | CGPA 7.86 | Core CS Stronghold.</p>
</section>

<section class="card p-8">
<h3 class="mb-4 text-[#FFD60A]">SKILLS</h3>
<div class="flex flex-wrap gap-4">
<span class="border-2 border-[#FFD60A] px-3 py-2">C++</span>
<span class="border-2 border-[#FFD60A] px-3 py-2">OOP</span>
<span class="border-2 border-[#FFD60A] px-3 py-2">DBMS</span>
<span class="border-2 border-[#FFD60A] px-3 py-2">OS</span>
<span class="border-2 border-[#FFD60A] px-3 py-2">CN</span>
</div>
</section>

<section class="card p-8">
<h3 class="mb-4 text-[#FFD60A]">CONTACT</h3>
<p>Noida, Uttar Pradesh</p>
<p>Email: avinashtiwari2005ws@gmail.com</p>
<button class="btn mt-4">SEND MESSAGE</button>
</section>

</main>

<footer class="text-center py-10 border-t-4 border-[#FF003C] mt-20 relative z-10">
<p class="text-[#FFD60A]">© 2026 Avinash Tiwari | Arcade Mode</p>
</footer>

<script>

/* STARFIELD */
for(let i=0;i<200;i++){
  const star=document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";
  star.style.animationDuration=(2+Math.random()*3)+"s";
  document.body.appendChild(star);
}

/* THEME TOGGLE */
const toggleBtn = document.getElementById("toggleTheme");

/* Load saved theme */
if(localStorage.getItem("theme")==="day"){
  document.body.classList.add("day");
  toggleBtn.innerText="🌙 NIGHT";
}

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("day");

  if(document.body.classList.contains("day")){
    toggleBtn.innerText = "🌙 NIGHT";
    localStorage.setItem("theme","day");
  } else {
    toggleBtn.innerText = "☀️ DAY";
    localStorage.setItem("theme","night");
  }
});

</script>

</body>
</html>
